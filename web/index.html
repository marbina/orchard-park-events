<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orchard Park Events</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:system-ui,sans-serif;background:#f8fafc;color:#1e293b;}
header{background:#1d4ed8;color:white;padding:20px;text-align:center;}
header h1{font-size:clamp(20px,4vw,28px);font-weight:800;}
header p{font-size:13px;opacity:0.8;margin-top:4px;}
.filters{display:flex;gap:8px;padding:16px;flex-wrap:wrap;justify-content:center;background:white;border-bottom:1px solid #e2e8f0;}
.filter-btn{padding:6px 14px;border-radius:20px;border:2px solid #e2e8f0;background:white;cursor:pointer;font-size:12px;font-weight:600;color:#64748b;}
.filter-btn.active{background:#1d4ed8;color:white;border-color:#1d4ed8;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;padding:20px;max-width:960px;margin:0 auto;}
.card{background:white;border-radius:12px;padding:18px;box-shadow:0 1px 4px rgba(0,0,0,0.08);border-left:4px solid #1d4ed8;}
.card.Community{border-left-color:#16a34a;}
.card.Environment{border-left-color:#0891b2;}
.card.Arts{border-left-color:#7c3aed;}
.tag{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
.tag.Community{background:#dcfce7;color:#16a34a;}
.tag.Environment{background:#e0f2fe;color:#0891b2;}
.tag.Arts{background:#ede9fe;color:#7c3aed;}
.card h2{font-size:16px;font-weight:700;margin-bottom:8px;}
.meta{font-size:12px;color:#64748b;margin-bottom:4px;}
.desc{font-size:13px;color:#475569;margin-top:10px;line-height:1.5;}
footer{text-align:center;padding:20px;font-size:12px;color:#94a3b8;margin-top:20px;}
</style>
</head>
<body>
<header>
  <h1>Orchard Park Events</h1>
  <p>Orchard Park, NY — Community Calendar</p>
</header>
<div class="filters" id="filters">
  <button class="filter-btn active" onclick="filter('all')">All Events</button>
</div>
<div class="grid" id="grid"></div>
<footer>Orchard Park, NY · Updated March 2026</footer>
<script>
let events=[],active="all";
fetch("op-events.json").then(r=>r.json()).then(data=>{
  events=data.events.sort((a,b)=>new Date(a.date)-new Date(b.date));
  const cats=[...new Set(events.map(e=>e.category))];
  const f=document.getElementById("filters");
  cats.forEach(c=>{const b=document.createElement("button");b.className="filter-btn";b.textContent=c;b.onclick=()=>filter(c);f.appendChild(b);});
  render();
});
function filter(cat){active=cat;document.querySelectorAll(".filter-btn").forEach(b=>{b.classList.toggle("active",b.textContent===cat||(cat==="all"&&b.textContent==="All Events"));});render();}
function fmt(d){return new Date(d+"T00:00:00").toLocaleDateString("en-US",{weekday:"short",month:"long",day:"numeric"});}
function render(){
  const filtered=active==="all"?events:events.filter(e=>e.category===active);
  document.getElementById("grid").innerHTML=filtered.map(e=>'<div class="card '+e.category+'"><span class="tag '+e.category+'">'+e.category+'</span><h2>'+e.title+'</h2><div class="meta">Date: '+fmt(e.date)+'</div><div class="meta">Time: '+e.time+'</div><div class="meta">Location: '+e.location+'</div><div class="desc">'+e.description+'</div></div>').join("");
}
</script>
</body>
</html>
